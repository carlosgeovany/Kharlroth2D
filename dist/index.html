<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Chronics of KHARLROTH</title>

    <link rel="stylesheet" crossorigin href="./assets/index-zaX-9FBw.css">
  </head>
  <body>
    <div id="app">
      <div>
        <p class="note">Tap/Click around to move</p>
        <p class="bye">Press Esc to exit</p>
        <!-- <div id="welcome-textbox-container">
          <div id="welcome-textbox">
            <p id="welcome-dialogue" class="ui-text"></p>
            <div class="btn-container">
              <button id="close-welcome" class="ui-close-btn">Close</button>
            </div>

        <div id="textbox-container" style="display: none">
          <div id="textbox">
            <p id="dialogue" class="ui-text"></p>
            <div class="btn-container">
              <button id="close" class="ui-close-btn">Close</button>
            </div>
          </div>
        </div>
        <div id="chatbox-container" style="display: none">
          <div id="chatbox">
            <div class="chat-header">
              <div>
                <p id="chat-npc-name" class="chat-title">Traveler</p>
                <p id="chat-npc-status" class="chat-status">Approach to speak</p>
              </div>
              <button id="chat-close" class="ui-close-btn chat-close-btn" type="button">Close</button>
            </div>
            <div id="chat-transcript" class="chat-transcript"></div>
            <form id="chat-form" class="chat-form">
              <input
                id="chat-input"
                class="chat-input"
                type="text"
                maxlength="180"
                autocomplete="off"
                placeholder="Ask something of this character..."
              />
              <button id="chat-send" class="ui-close-btn chat-send-btn" type="submit">Send</button>
            </form>
          </div>
        </div>
      </div>
      <canvas id="game"></canvas>
    </div>
  </body>
